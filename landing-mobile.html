<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Alexander Ahlquist</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=block');

        @font-face {
            font-display: swap;
           font-family: 'whacky_joe';
            src: url('assets/fonts/Whacky_joe.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1447d4;
            min-height: 100vh;
            font-family: 'whacky_joe', 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
        }

        header {
            background-color: #0f2fa0;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .logo {
            font-size: 14px;
            color: #f0ff1b;
            font-weight: bold;
            text-decoration: none;
        }

        nav {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        nav a {
            color: #f0ff1b;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.3s ease;
            background-color: #e93d3d;
        }

        nav a:active {
            transform: scale(0.95);
            opacity: 0.9;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 15px;
        }

        .content {
            max-width: 100%;
            width: 100%;
            text-align: center;
            color: #f0ff1b;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Alex Ahlquist</div>
        <nav>
            <a href="pages/rabbits/index.html">Rabbits</a>
        </nav>
    </header>

    <main>
        <div class="content">
            <!-- Main content goes here -->
        </div>
    </main>
</body>
</html>
