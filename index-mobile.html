<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Alexander Ahlquist</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=block');

        @font-face {
            font-display: swap;
            font-family: 'whacky_joe';
            src: url('assets/fonts/Whacky_joe.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1447d4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'whacky_joe', 'Press Start 2P', monospace;
            padding: 10px;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 10px;
            width: 100%;
        }

        @keyframes jump {
            0%, 100% {
                transform: translateY(0) scaleX(1);
            }
            50% {
                transform: translateY(-15px) scaleX(0.95);
            }
        }

        .name-images {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            max-width: 100%;
            cursor: pointer;
        }

        .name-images img {
            max-width: 100%;
            width: 95vw;
            height: 100px;
            object-fit: contain;
        }

        .name-images:active img {
            animation: jump 0.6s ease-in-out infinite;
        }

        .enter-btn {
            background-color: #e93d3d;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'whacky_joe', 'Press Start 2P', monospace;
            color: #f0ff1b;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            min-width: 140px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .enter-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .enter-btn span {
            display: inline-block;
        }

        .enter-btn:active span {
            animation: jump 0.6s ease-in-out infinite;
        }

        .enter-btn:active span:nth-child(1) {
            animation-delay: 0s;
        }

        .enter-btn:active span:nth-child(2) {
            animation-delay: 0.1s;
        }

        .enter-btn:active span:nth-child(3) {
            animation-delay: 0.2s;
        }

        .enter-btn:active span:nth-child(4) {
            animation-delay: 0.3s;
        }

        .enter-btn:active span:nth-child(5) {
            animation-delay: 0.4s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="name-images">
            <img src="assets/images/Alex_Name.png" alt="Alex">
            <img src="assets/images/Ahlquist_Name.png" alt="Ahlquist">
        </div>
        <button class="enter-btn" onclick="window.location.href='landing-mobile.html'"><span>E</span><span>n</span><span>t</span><span>e</span><span>r</span></button>
    </div>
</body>
</html>
