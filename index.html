<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexander Ahlquist</title>
    <style>
        @font-face {
            font-family: 'whacky_joe';
            src: url('assets/fonts/Whacky_joe.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1447d4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'whacky_joe', Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 20px;
        }

        @keyframes jump {
            0%, 100% {
                transform: translateY(0) scaleX(1);
            }
            50% {
                transform: translateY(-20px) scaleX(0.95);
            }
        }

        .name-images {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            max-width: 100%;
            cursor: pointer;
        }

        .name-images img {
            max-width: 100%;
            width: 80vw;
            max-width: 600px;
            height: 200px;
            object-fit: contain;
        }

        .name-images:hover img {
            animation: jump 0.6s ease-in-out infinite;
        }

        .name-images:hover img:nth-child(2) {
            animation-delay: 0.1s;
        }

        .name-images img:first-child {
            height: 200px;
        }

        .enter-btn {
            background-color: #e93d3d;
            border: none;
            padding: 15px 50px;
            font-size: 18px;
            font-weight: bold;
            font-family: 'whacky_joe', Arial, sans-serif;
            color: #f0ff1b;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            min-width: 180px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .enter-btn:hover {
            background-color: #e93d3d;
            color: #f0ff1b;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .enter-btn:active {
            transform: scale(0.98);
        }

        .enter-btn span {
            display: inline-block;
        }

        .enter-btn:hover span {
            animation: jump 0.6s ease-in-out infinite;
        }

        .enter-btn:hover span:nth-child(1) {
            animation-delay: 0s;
        }

        .enter-btn:hover span:nth-child(2) {
            animation-delay: 0.1s;
        }

        .enter-btn:hover span:nth-child(3) {
            animation-delay: 0.2s;
        }

        .enter-btn:hover span:nth-child(4) {
            animation-delay: 0.3s;
        }

        .enter-btn:hover span:nth-child(5) {
            animation-delay: 0.4s;
        }


        @media (max-width: 768px) {
            .name-images img {
                width: 90vw;
            }

            .enter-btn {
                padding: 12px 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="name-images">
            <img src="assets/images/Alex_Name.png" alt="Alex">
            <img src="assets/images/Ahlquist_Name.png" alt="Ahlquist">
        </div>
        <button class="enter-btn" onclick="window.location.href='landing.html'"><span>E</span><span>n</span><span>t</span><span>e</span><span>r</span></button>
    </div>
</body>
</html>
